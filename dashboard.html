<!DOCTYPE html>
<html>
<head>
<title>Main Menu</title>
<style>
body{margin:0;font-family:Arial;background:#000000}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:linear-gradient(180deg,#1e293b,#0f172a);padding-top:20px}
.sidebar h3{color:white;text-align:center;margin-bottom:20px}
.sidebar a{display:block;color:#cbd5e1;padding:12px 20px;text-decoration:none}
.sidebar a:hover{background:#3b82f6;color:white}
.main{margin-left:240px;padding:30px}
.card{background:white;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);margin-bottom:20px}
button{padding:10px 20px;margin-top:15px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer}
button:hover{background:#2563eb}
</style>
</head>
<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href="login.html";
}
</script>



<div class="main">
<div class="card">
<h2>Welcome back <username></h2>
<p>Use this system to check your symptoms and get your sickness diagnosed.</p>
</div>

<div class="card">
<h3>Quick Actions</h3>
<button onclick="window.location.href='diagnosis.html'">Start Diagnosis</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<script>
function logout(){
    localStorage.removeItem("loggedIn");
    alert("Logged out");
    window.location.href="login.html";
}
</script>

</body>
</html>
