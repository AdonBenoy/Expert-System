<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{margin:0;font-family:Arial;background:#f1f5f9;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{background:white;padding:40px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.2);text-align:center;width:300px;}
input{width:90%;height:40px;margin:10px 0;border-radius:10px;border:1px solid #ccc;padding:10px;}
button{padding:10px 20px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer;margin-top:10px;}
button:hover{background:#2563eb;}
</style>
</head>
<body>

<div class="container">
<h2>Login</h2>
<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button onclick="login()">Login</button><br>
<button onclick="window.location.href='signup.html'" style="margin-top:10px;">Don't have an account? Sign Up</button>
</div>

<script>
if(localStorage.getItem("loggedIn") === "true"){
    window.location.href="diagnosis.html";
}

function login(){
    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;
    let storedUser = localStorage.getItem("username");
    let storedPass = localStorage.getItem("password");  

    if(!storedUser || !storedPass){
        alert("No account found. Please sign up first.");
        window.location.href="signup.html";
        return;
    }

    if(username === storedUser && password === storedPass){
        localStorage.setItem("loggedIn","true");
        window.location.href="diagnosis.html";
    } else {
        alert("Incorrect username or password");
    }
}
</script>

</body>
</html>
